# Writes "arms_level.tbl", "bullet.tbl", and "caret.tbl" to the folder the exe is in.
Write Tables on Boot (TBL) = false

# Writes "arms_level.yaml", "bullet.yaml", and "caret.yaml" to the folder the exe is in.
# These have the same functionality as the .tbl format, but are easier to edit.
Write Tables on Boot (YAML) = false

# Enables a debug mode for autpi, accessible by pressing Shift+F2 in game.
Debug Mode = true

# Replaces all instances of the "damage player" function with a new variant that can be replaced with ModCS Lua code.
# This should only be disabled in cases where you're absolutely certain it will conflict with asm hacks, in an older mod.
Replace Player Damage function = true

# Replaces the player hud functions with new variants that can be replaced with ModCS Lua code.
# This should only be disabled in cases where you're absolutely certain it will conflict with asm hacks, in an older mod.
Replace Player Hud functions = true

# Replaces the inventory function with a new variant that can be replaced with ModCS Lua code.
# This should only be disabled in cases where you're absolutely certain it will conflict with asm hacks, in an older mod.
Replace Inventory Menu function = true

# Replaces the map system function with a new variant that can be replaced with ModCS Lua code.
# This should only be disabled in cases where you're absolutely certain it will conflict with asm hacks, in an older mod.
Replace Map System Menu function = true

# Replaces all instances of the "Escape Menu" function with a new variant that can be replaced with ModCS Lua code.
# This should only be disabled in cases where you're absolutely certain it will conflict with asm hacks, in an older mod.
Replace Escape Menu function = true

# Enables the Old ModCS Lua support for mouse input, from some autpi releases pre-1.3.
# This is not recommended, as it is very jank and experiemental, and I couldn't make it work how I'd like it to.
# You will not receive help/support with this toggle since it's a dead feature, I recommend not thinking about it.
Enable Old ModCS Mouse Code = false

# Completely skips the "LoadGenericData" function the vanilla game uses, meaning you have to load the data yourself.
# (Sound effects are loaded nonetheless.. not sure how to go about custom sfx then. Maybe avoid this setting for now?)
Skip Asset Loading = false

# Changes the way the "game modes" works.
# Allows the creation of new game modes to have much more control of the game.
# The "Set Mode" lua function will no longer work if this is enabled.
Use Mode Overhaul = false

# Completely disable vanila/dll npc code, relying entirely on ModCS Lua scripts.
Disable Vanilla Npc Code = true

# Completely disable vanilla/dll map boss code, relying entirely on ModCS Lua scripts.
Disable Vanilla Map Boss Code = false

# Completely disable vanila/dll caret code, relying entirely on ModCS Lua scripts.
Disable Vanilla Caret Code = false

# Completely disable vanila/dll bullet code, relying entirely on ModCS Lua scripts.
Disable Vanilla Bullet Code = false

# Completely disable vanila/dll weapon shoot code, relying entirely on ModCS Lua scripts.
Disable Vanilla Shoot Code = false
